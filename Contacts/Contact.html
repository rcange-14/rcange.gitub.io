<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ralph Cange - Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="./style4.css">
  </head>
  <body>

    <header>
      <h2 class="logo"><span>R</span>alph</h2>
      <nav class="navigation">
        <a href="../Home.html">Home</a>
        <a href="../about/About.html">About</a>
        <a href="../Portfolio/Portfolio.html">Portfolio</a>
        <a href="./Contact.html" class="active">Contacts</a>
      </nav>
    </header>

    <section class="home">
      <div class="content">
        <h2>Contact<span> Me</span></h2>
        <p>Feel free to reach out — I'll get back to you as soon as possible.</p>

        <!-- Social Icons -->
        <div class="social-icons">
          <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
          <a href="https://github.com/rcange-14" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
          <a href="mailto:Ralph.Cange89@qmail.cuny.edu" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
        </div>

        <!-- Contact Form -->
        <form id="contactForm" class="contact-form" novalidate>

          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" autocomplete="off">
            <span class="error-msg" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="off">
            <span class="error-msg" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" autocomplete="off">
            <span class="error-msg" id="subjectError"></span>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
            <span class="error-msg" id="messageError"></span>
          </div>

          <button type="submit" class="submit-btn">
            <i class="fa-solid fa-paper-plane"></i> Send Message
          </button>

        </form>

        <!-- Success Message (hidden until form submits) -->
        <div id="formSuccess" class="success-msg" style="display:none;">
          <i class="fa-solid fa-circle-check"></i>
          <p>Thanks for reaching out! I'll get back to you soon.</p>
        </div>

      </div>
    </section>

    <script src="./contact.js"></script>
  </body>
</html>
